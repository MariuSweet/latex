<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaTeX Cloud Editor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --accent: #7c6af7;
    --accent2: #4fd1c5;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --danger: #f56565;
    --success: #48bb78;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* AUTH SCREEN */
  #auth-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #auth-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
  }

  #auth-screen::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(79,209,197,0.1) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    pointer-events: none;
  }

  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    width: 400px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .auth-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
    font-family: var(--font-mono);
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 8px;
  }

  .auth-tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--accent);
    color: white;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: #6b5ce7; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .auth-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    font-family: var(--font-mono);
    text-align: center;
  }

  /* MAIN APP */
  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .project-selector {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #project-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    max-width: 200px;
  }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-display);
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .compile-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    padding: 8px 20px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .compile-btn:hover { background: #6b5ce7; }
  .compile-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .save-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 16px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .user-info {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .logout-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: color 0.2s;
  }

  .logout-btn:hover { color: var(--danger); }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* EDITOR */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    min-width: 0;
  }

  .pane-header {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #editor {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.7;
    padding: 24px;
    border: none;
    outline: none;
    resize: none;
    tab-size: 2;
  }

  /* PDF VIEWER */
  .pdf-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .pdf-container {
    flex: 1;
    background: #404040;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    position: relative;
  }

  #pdf-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .pdf-placeholder {
    text-align: center;
    color: var(--text-dim);
  }

  .pdf-placeholder .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .pdf-placeholder p {
    font-size: 14px;
    font-family: var(--font-mono);
  }

  /* STATUS BAR */
  .status-bar {
    height: 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }

  .status-item {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .status-dot.green { background: var(--success); }
  .status-dot.yellow { background: #f6ad55; animation: pulse 1s infinite; }
  .status-dot.red { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 360px;
    animation: fadeUp 0.2s ease;
  }

  .modal h3 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 20px;
  }

  .modal input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .modal input:focus { border-color: var(--accent); }

  .modal-btns {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-cancel {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-display);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--danger); color: var(--danger); }

  .btn-confirm {
    padding: 10px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: var(--font-display);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-confirm:hover { background: #6b5ce7; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .compile-btn.loading .spinner { display: block; }
  .compile-btn.loading .btn-text { display: none; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">LaTeX Cloud</div>
    <div class="auth-subtitle">// tu editor personal en la nube</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Ingresar</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="tu@email.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="handleAuth()" id="auth-btn">Ingresar</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">LaTeX Cloud</div>
      <div class="project-selector">
        <select id="project-select" onchange="loadProject()">
          <option value="">— seleccioná un proyecto —</option>
        </select>
        <button class="btn-icon" onclick="showNewProjectModal()">+ Nuevo</button>
        <button class="btn-icon" onclick="deleteProject()" style="color: var(--text-dim)">🗑</button>
      </div>
    </div>
    <div class="header-right">
      <button class="save-btn" onclick="saveProject()">Guardar</button>
      <button class="compile-btn" onclick="compile()" id="compile-btn">
        <div class="spinner"></div>
        <span class="btn-text">▶ Compilar</span>
      </button>
      <span class="user-info" id="user-email"></span>
      <button class="logout-btn" onclick="logout()">salir</button>
    </div>
  </div>

  <div class="main">
    <div class="editor-pane">
      <div class="pane-header">
        <span>editor .tex</span>
        <span id="save-status" style="color: var(--accent2)"></span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="% Escribí tu código LaTeX acá&#10;\documentclass{article}&#10;\begin{document}&#10;Hola mundo&#10;\end{document}"></textarea>
    </div>
    <div class="pdf-pane">
      <div class="pane-header">
        <span>vista previa PDF</span>
        <span id="compile-status"></span>
      </div>
      <div class="pdf-container">
        <iframe id="pdf-frame"></iframe>
        <div class="pdf-placeholder" id="pdf-placeholder">
          <div class="icon">📄</div>
          <p>El PDF aparecerá acá después de compilar</p>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot green" id="server-dot"></div>
      <span id="server-status">servidor listo</span>
    </div>
    <div class="status-item">
      <span id="char-count">0 caracteres</span>
    </div>
  </div>
</div>

<!-- MODAL NUEVO PROYECTO -->
<div class="modal-overlay" id="new-project-modal">
  <div class="modal">
    <h3>Nuevo proyecto</h3>
    <input type="text" id="new-project-name" placeholder="Ej: Tesis, Informe, Apuntes..." 
           onkeydown="if(event.key==='Enter') createProject()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideNewProjectModal()">Cancelar</button>
      <button class="btn-confirm" onclick="createProject()">Crear</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://mksqglxkedgdpzdqpldl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9fPmdejj4pCUeAIZibFiqw_cws3s6H_';
const RENDER_URL = 'https://latex-bcnj.onrender.com';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProjectId = null;
let saveTimeout = null;
let authMode = 'login';

// AUTH
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'register' && i === 1));
  });
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Ingresar' : 'Crear cuenta';
  document.getElementById('auth-error').textContent = '';
}

async function handleAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-btn');
  const errEl = document.getElementById('auth-error');

  if (!email || !password) { errEl.textContent = 'Completá todos los campos'; return; }

  btn.disabled = true;
  btn.textContent = 'Cargando...';
  errEl.textContent = '';

  let result;
  if (authMode === 'login') {
    result = await sb.auth.signInWithPassword({ email, password });
  } else {
    result = await sb.auth.signUp({ email, password });
  }

  if (result.error) {
    errEl.textContent = result.error.message;
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Ingresar' : 'Crear cuenta';
  } else {
    currentUser = result.data.user;
    showApp();
  }
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProjectId = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

// APP
async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-email').textContent = currentUser.email;
  await loadProjects();
}

async function loadProjects() {
  const { data } = await sb.from('projects').select('id, name').order('created_at', { ascending: false });
  const select = document.getElementById('project-select');
  select.innerHTML = '<option value="">— seleccioná un proyecto —</option>';
  if (data) {
    data.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.name;
      select.appendChild(opt);
    });
  }
}

async function loadProject() {
  const id = document.getElementById('project-select').value;
  if (!id) { currentProjectId = null; document.getElementById('editor').value = ''; return; }
  currentProjectId = id;
  const { data } = await sb.from('projects').select('content').eq('id', id).single();
  if (data) {
    document.getElementById('editor').value = data.content || '';
    updateCharCount();
  }
}

async function saveProject() {
  if (!currentProjectId) return;
  const content = document.getElementById('editor').value;
  await sb.from('projects').update({ content, updated_at: new Date().toISOString() }).eq('id', currentProjectId);
  const status = document.getElementById('save-status');
  status.textContent = '✓ guardado';
  setTimeout(() => status.textContent = '', 2000);
}

function showNewProjectModal() {
  document.getElementById('new-project-modal').classList.add('active');
  setTimeout(() => document.getElementById('new-project-name').focus(), 100);
}

function hideNewProjectModal() {
  document.getElementById('new-project-modal').classList.remove('active');
  document.getElementById('new-project-name').value = '';
}

async function createProject() {
  const name = document.getElementById('new-project-name').value.trim();
  if (!name) return;

  const defaultContent = `\\documentclass{article}
\\usepackage[utf8]{inputenc}
\\usepackage[T1]{fontenc}
\\title{${name}}
\\author{}
\\date{\\today}

\\begin{document}
\\maketitle

\\section{Introducción}
Empezá a escribir acá.

\\end{document}`;

  const { data } = await sb.from('projects').insert({
    name,
    content: defaultContent,
    user_id: currentUser.id
  }).select().single();

  hideNewProjectModal();
  await loadProjects();
  document.getElementById('project-select').value = data.id;
  currentProjectId = data.id;
  document.getElementById('editor').value = defaultContent;
  updateCharCount();
}

async function deleteProject() {
  if (!currentProjectId) return;
  if (!confirm('¿Borrar este proyecto? No se puede deshacer.')) return;
  await sb.from('projects').delete().eq('id', currentProjectId);
  currentProjectId = null;
  document.getElementById('editor').value = '';
  await loadProjects();
}

// COMPILE
async function compile() {
  const latex = document.getElementById('editor').value;
  if (!latex.trim()) return;

  const btn = document.getElementById('compile-btn');
  const statusEl = document.getElementById('compile-status');
  const dotEl = document.getElementById('server-dot');
  const serverStatus = document.getElementById('server-status');

  btn.classList.add('loading');
  btn.disabled = true;
  statusEl.textContent = 'compilando...';
  statusEl.style.color = '#f6ad55';
  dotEl.className = 'status-dot yellow';
  serverStatus.textContent = 'compilando...';

  try {
    const res = await fetch(`${RENDER_URL}/compile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ latex })
    });

    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const frame = document.getElementById('pdf-frame');
      frame.src = url;
      frame.style.display = 'block';
      document.getElementById('pdf-placeholder').style.display = 'none';
      statusEl.textContent = '✓ compilado';
      statusEl.style.color = 'var(--success)';
      dotEl.className = 'status-dot green';
      serverStatus.textContent = 'servidor listo';
    } else {
      statusEl.textContent = '✗ error de compilación';
      statusEl.style.color = 'var(--danger)';
      dotEl.className = 'status-dot red';
      serverStatus.textContent = 'error';
    }
  } catch (e) {
    statusEl.textContent = '✗ no se pudo conectar al servidor';
    statusEl.style.color = 'var(--danger)';
    dotEl.className = 'status-dot red';
    serverStatus.textContent = 'servidor desconectado';
  }

  btn.classList.remove('loading');
  btn.disabled = false;
  setTimeout(() => { statusEl.textContent = ''; }, 4000);
}

// EDITOR UTILS
function updateCharCount() {
  const len = document.getElementById('editor').value.length;
  document.getElementById('char-count').textContent = `${len.toLocaleString()} caracteres`;
}

document.getElementById('editor').addEventListener('input', () => {
  updateCharCount();
  clearTimeout(saveTimeout);
  if (currentProjectId) {
    document.getElementById('save-status').textContent = '● sin guardar';
    saveTimeout = setTimeout(saveProject, 3000);
  }
});

document.getElementById('editor').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target;
    const start = el.selectionStart;
    el.value = el.value.substring(0, start) + '  ' + el.value.substring(el.selectionEnd);
    el.selectionStart = el.selectionEnd = start + 2;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveProject();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    compile();
  }
});

// Check session on load
sb.auth.getSession().then(({ data }) => {
  if (data.session) {
    currentUser = data.session.user;
    showApp();
  }
});
</script>
</body>
